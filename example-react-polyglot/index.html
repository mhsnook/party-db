<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>party-db · polyglot — public catalog + per-user collections</title>
    <style>
      :root { color-scheme: light dark; }
      body { font: 16px/1.5 system-ui, sans-serif; max-width: 34rem; margin: 3rem auto; padding: 0 1.25rem; }
      h1 { margin: 0 0 0.25rem; font-size: 1.4rem; }
      .sub { margin: 0 0 0.75rem; color: #888; font-size: 0.9rem; }
      .sub code, .flag code { background: #8882; padding: 0.05rem 0.3rem; border-radius: 4px; }
      .flag { margin: 0 0 1.25rem; padding: 0.5rem 0.7rem; border-radius: 6px; background: #f59e0b1a; color: #b45309; font-size: 0.85rem; }
      form { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
      input, select { padding: 0.45rem 0.6rem; border: 1px solid #8884; border-radius: 6px; font: inherit; }
      form input { flex: 1; }
      button { padding: 0.45rem 0.85rem; border: 0; border-radius: 6px; background: #4f46e5; color: #fff; font: inherit; cursor: pointer; }
      ul { list-style: none; padding: 0; margin: 0 0 1rem; }
      li { display: flex; align-items: center; gap: 0.6rem; padding: 0.45rem 0; border-bottom: 1px solid #8881; }
      li button { margin-left: auto; }
      li .status { color: #999; font-style: normal; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; }
      li[data-status="known"] strong { color: #16a34a; }
      li[data-status="learning"] .status { color: #d97706; }
      nav.langs { display: flex; gap: 0.5rem; margin: 0 0 1rem; }
      nav.langs button { background: #6b7280; }
      nav.langs button.on { background: #4f46e5; }
      .deck { display: flex; gap: 1rem; margin: 0 0 1rem; align-items: center; font-size: 0.9rem; }
      .deck label { display: flex; gap: 0.4rem; align-items: center; }
      .deck input { width: 4rem; }
      .start { background: #16a34a; margin-bottom: 1rem; }
      .auth { display: flex; gap: 0.5rem; align-items: center; margin: 0 0 1rem; font-size: 0.9rem; }
      .auth button { background: #6b7280; }
      .hint { color: #888; font-size: 0.85rem; }
      .error { margin: 0.25rem 0 1rem; padding: 0.5rem 0.7rem; border-radius: 6px; background: #ef44441a; color: #b91c1c; font-size: 0.9rem; }
      hr { border: 0; border-top: 1px solid #8882; margin: 1.5rem 0; }
      footer { margin-top: 2rem; font-size: 0.85rem; color: #888; }
      footer a { color: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
